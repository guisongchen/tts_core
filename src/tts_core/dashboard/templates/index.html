{% extends "base.html" %}

{% block content %}

<section id="status-panel" hx-get="/partials/status" hx-trigger="load, refresh-status from:body">
    {% include "partials/status.html" %}
</section>

<section class="logs-section">
    <div class="section-header">
        <h2>服务日志</h2>
        <select id="log-service"
                hx-get="/partials/logs/tts-core"
                hx-target="#logs-content"
                hx-trigger="change, load">
            {% for svc in ["tts-core", "tts-core-dashboard", "asr-core", "asr-core-dashboard", "voice-to-text", "lp998-listener"] %}
            <option value="{{ svc }}"{% if svc == "tts-core" %} selected{% endif %}>{{ svc }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="logs-content" class="logs-box"
         hx-get="/partials/logs/tts-core"
         hx-target="this"
         hx-trigger="load, refresh-logs from:body">
        {% include "partials/logs.html" %}
    </div>
</section>

<script>
(function() {
    var interval = null;
    var fast = false;

    function startPoll(ms) {
        if (interval) clearInterval(interval);
        var panel = document.getElementById('status-panel');
        interval = setInterval(function() { htmx.trigger(panel, 'refresh-status'); }, ms);
    }

    document.body.addEventListener('htmx:afterSettle', function() {
        var badge = document.querySelector('.badge-loading');
        if (badge && !fast) {
            fast = true;
            startPoll(3000);
        } else if (!badge && fast) {
            fast = false;
            startPoll(10000);
        } else if (!badge && !interval) {
            startPoll(10000);
        }
    });

    document.body.addEventListener('htmx:beforeRequest', function(e) {
        var form = document.getElementById('model-actions');
        if (form && form.contains(e.target)) {
            form.querySelectorAll('button, select').forEach(function(el) {
                el.disabled = true;
            });
        }
    });

    var logSelect = document.getElementById('log-service');
    if (logSelect) {
        logSelect.addEventListener('change', function() {
            var logs = document.getElementById('logs-content');
            logs.setAttribute('hx-get', '/partials/logs/' + this.value);
            htmx.process(logs);
            htmx.trigger(logs, 'load');
        });
    }

    var synthForm = document.getElementById('synthesize-form');
    if (synthForm) {
        synthForm.addEventListener('htmx:afterRequest', function() {
            startPoll(10000);
        });
    }
})();
</script>

{% endblock %}
