<div class="synth-result" style="padding:0.75rem;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:0.5rem;">
    <div style="margin-bottom:0.5rem;">
        <strong>合成完成</strong>
        <span style="color:var(--muted);margin-left:1rem;">{{ result.duration_seconds|round(1) }}s</span>
        <span style="color:var(--muted);margin-left:1rem;">{{ result.sample_rate }}Hz</span>
    </div>
    <div style="font-size:0.85rem;color:var(--muted);word-break:break-all;">{{ result.audio_path }}</div>
    <audio controls style="width:100%;margin-top:0.5rem;">
        <source src="/api/audio?path={{ result.audio_path|urlencode }}" type="audio/wav">
    </audio>
</div>
